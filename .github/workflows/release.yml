name: Generate index

on:
  push:
    branches: 'main'
    paths:
      - 'localized_data/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Checkout nhánh release hiện tại làm thư mục gốc
      - uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      # 2. Checkout nhánh main (Tiếng Việt) về thư mục tạm 'vn_repo'
      - uses: actions/checkout@v4
        with:
          ref: main
          path: vn_repo

      # 3. Checkout repo EN về thư mục tạm 'base_tl'
      - uses: actions/checkout@v4
        with:
          repository: Shigure-Ruiseki/hachimi-tl-en
          ref: main
          fetch-depth: 0
          path: base_tl

      # 4. Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 5. Cài đặt các phụ thuộc cần thiết (Bao gồm cả pygit2 và blake3 cho script index)
      - name: Install dependencies
        run: |
          curl -O https://raw.githubusercontent.com/Hachimi-Hachimi/tl-en/refs/heads/dev/gen_index.py
          curl -O https://raw.githubusercontent.com/Hachimi-Hachimi/tl-en/refs/heads/dev/requirements.txt
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 6. Thực hiện đồng bộ cấu trúc hình ảnh và hòa trộn tệp JSON
      - name: Merge changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Đập đi xây lại cấu trúc nền: Chuyển dữ liệu EN vào thế chỗ
          rm -rf localized_data
          mv -f base_tl/localized_data .
          rm -rf base_tl

          # Chạy script Python gộp dữ liệu dịch và giữ Texture độc quyền từ vn_repo
          cat << 'EOF' > smart_patch.py
          import json
          import os
          import shutil

          def sort_dict_by_natural_key(d):
              if not isinstance(d, dict): return d
              def get_sort_key(item):
                  key = item[0]
                  if key.isdigit(): return (0, int(key))
                  return (1, key.lower())
              return {k: sort_dict_by_natural_key(v) for k, v in sorted(d.items(), key=get_sort_key)}

          def merge_json(old_data, new_data):
              if isinstance(old_data, dict) and isinstance(new_data, dict):
                  result = dict(new_data)
                  for key, value in old_data.items():
                      if key in result and isinstance(result[key], dict) and isinstance(value, dict):
                          result[key] = merge_json(value, result[key])
                      else:
                          result[key] = value
                  return sort_dict_by_natural_key(result)
              return old_data if old_data is not None else new_data

          vn_dir = "vn_repo/localized_data"
          target_dir = "localized_data"

          vi_exclusive_files = set()

          # BƯỚC 1: Cứu file độc quyền (storytimeline...) và texture .png của VI
          for root, _, files in os.walk(vn_dir):
              for file in files:
                  vn_file_path = os.path.join(root, file)
                  rel_path = os.path.relpath(vn_file_path, vn_dir)
                  target_file_path = os.path.join(target_dir, rel_path)

                  if not os.path.exists(target_file_path):
                      os.makedirs(os.path.dirname(target_file_path), exist_ok=True)
                      shutil.copy2(vn_file_path, target_file_path)
                      vi_exclusive_files.add(target_file_path)
                  elif "includes_win" in file:
                      shutil.copy2(vn_file_path, target_file_path)

          # BƯỚC 2: Quét xử lý gộp đệ quy tệp JSON trùng nhau
          for root, _, files in os.walk(target_dir):
              for file in files:
                  if file.endswith(".json"):
                      file_path = os.path.join(root, file)
                      
                      if file_path in vi_exclusive_files:
                          with open(file_path, "r", encoding="utf-8") as f:
                              pure_vi = json.load(f)
                          with open(file_path, "w", encoding="utf-8") as f:
                              json.dump(sort_dict_by_natural_key(pure_vi), f, ensure_ascii=False, indent=2, sort_keys=False)
                          continue

                      vn_equivalent = os.path.join(vn_dir, os.path.relpath(file_path, target_dir))
                      
                      if os.path.exists(vn_equivalent):
                          with open(vn_equivalent, "r", encoding="utf-8") as f:
                              vi_json = json.load(f)
                          with open(file_path, "r", encoding="utf-8") as f:
                              en_json = json.load(f)

                          merged = merge_json(vi_json, en_json)

                          with open(file_path, "w", encoding="utf-8") as f:
                              json.dump(merged, f, ensure_ascii=False, indent=2, sort_keys=False)
          EOF

          python smart_patch.py
          # Dọn dẹp script patch tạm thời, NHƯNG giữ lại thư mục vn_repo
          rm -f smart_patch.py

      # 7. CHUẨN BỊ CHO PYGIT2: Đưa tất cả file mới (gồm cả storytimeline...) vào vùng chờ của Git (Staging Area)
      - name: Stage files for Git Tree
        run: |
          git add localized_data/*

      # 8. Chạy script index gốc (Lúc này pygit2 quét từ HEAD cũ nhưng file thực tế vẫn khớp cấu trúc add)
      - name: Create index
        run: |
          python gen_index.py
          # Sau khi tạo xong index.json, dọn dẹp nốt thư mục tạm và file script index
          rm -rf vn_repo gen_index.py requirements.txt index_base.json

      # 9. COMMIT TẤT CẢ TRONG MỘT PHÁT DUY NHẤT (Gồm cả file dịch, file texture và index.json)
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update localized data and release index
          branch: release
          file_pattern: 'localized_data/*'
          add_options: '--all'

      # 10. Gửi Webhook thông báo kết quả hành động
      - name: Send update
        if: ${{ vars.NOTIFY_REPO }}
        run: |
          curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.UPD_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository_owner }}/${{ vars.NOTIFY_REPO }}/actions/workflows/release.yml/dispatches \
          -d '{"ref":"main"}'