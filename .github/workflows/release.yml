name: Generate index

on:
    push:
        branches: 'main'
        paths:
            - 'localized_data/**'
    workflow_dispatch:
    repository_dispatch:
        types:
            [
                hachimi-tl-en,
            ]

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: release
                  fetch-depth: 0

            - uses: actions/checkout@v4
              with:
                  ref: main
                  path: vn_repo

            - uses: actions/checkout@v4
              with:
                  repository: Shigure-Ruiseki/hachimi-tl-en
                  ref: main
                  fetch-depth: 0
                  path: base_tl

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run:
                  |
                  curl -O https://raw.githubusercontent.com/Hachimi-Hachimi/tl-en/refs/heads/dev/gen_index.py
                  curl -O https://raw.githubusercontent.com/Hachimi-Hachimi/tl-en/refs/heads/dev/requirements.txt
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  npm install -g prettier prettier-plugin-sort-json

            - name: Merge changes
              run:
                  |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  rm -rf localized_data
                  mv -f base_tl/localized_data .
                  rm -rf base_tl

                  cp vn_repo/patch.py .
                  python patch.py

                  if [ -f "vn_repo/.prettierrc" ]; then
                      cp vn_repo/.prettierrc .
                  elif [ -f "vn_repo/.prettierrc.json" ]; then
                      cp vn_repo/.prettierrc.json .prettierrc
                  fi

                  prettier --write "localized_data/**/*.json"

            - uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: Merge changes
                  branch: release
                  file_pattern: 'localized_data/*'

            - name: Create index
              run: python gen_index.py

            - name: Format index file
              run:
                  |
                  # Tái sử dụng file .prettierrc vừa lấy từ repo trước khi xóa sạch
                  if [ -f ".prettierrc" ]; then
                      prettier --write index.json
                  fi

            - name: Clean up temp folders and configurations
              run: rm -f patch.py .prettierrc && rm -rf vn_repo

            - uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: Update index
                  branch: release
                  file_pattern: 'localized_data/* index.json'

            - name: Send update
              if: ${{ vars.NOTIFY_REPO }}
              run:
                  |
                  curl -L -X POST \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.UPD_TOKEN }}" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  https://api.github.com/repos/${{ github.repository_owner }}/${{ vars.NOTIFY_REPO }}/actions/workflows/release.yml/dispatches \
                  -d '{"ref":"main"}'
